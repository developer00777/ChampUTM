services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: champutm
      POSTGRES_PASSWORD: champutm_dev
      POSTGRES_DB: champutm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U champutm -d champutm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: champutm
      POSTGRES_PASSWORD: champutm_dev
      POSTGRES_DB: champutm
      JWT_SECRET_KEY: local-dev-secret-key-change-in-production-min32
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__
            - "*.pyc"
            - .venv

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
